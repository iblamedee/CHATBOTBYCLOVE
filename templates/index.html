<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CLOVE</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>

<body>
  <div class="app">
    <header class="app-header">
      <div class="header-row">
        <div class="title">
          <h1>CLOVE CHATBOT</h1>
        </div>
        <button id="newChatBtn" class="ghost" type="button">New chat</button>
      </div>
      <p class="sub">Ask anything — your assistant is ready.</p>
    </header>

    <main class="chat" id="chat">
      <div class="message system">Hi there! Send a message to get started.</div>
    </main>

    <footer class="composer">
      <input id="userInput" placeholder="Type a message..." autocomplete="off" />
      <button id="sendBtn">Send</button>
    </footer>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
